services:
  - type: web
    name: photo-indexer-demo
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:10000 --timeout 120
    envVars:
      - key: DEMO_MODE
        value: "1"
      - key: PORT
        value: "10000"
      - key: PYTHON_VERSION
        value: "3.11.0"
